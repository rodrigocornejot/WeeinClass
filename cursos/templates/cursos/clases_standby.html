<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clases en Standby</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f6f7fb;
}

.card{
border:none;
border-radius:14px;
box-shadow:0 10px 24px rgba(0,0,0,.08);
}

.badge-standby{
background:#fff3cd;
color:#856404;
font-weight:600;
}

.btn-programar{
background:#2563eb;
color:white;
font-weight:600;
}

.btn-programar:hover{
background:#1d4ed8;
color:white;
}

.table thead{
background:#0f172a;
color:white;
}

</style>

</head>

<body>

<div class="container py-4" style="max-width:1100px;">

<div class="d-flex justify-content-between align-items-center mb-3">
<h3 class="fw-bold">⏳ Clases en Standby</h3>

<a href="{% url 'vista_calendario' %}" class="btn btn-outline-secondary btn-sm">
← Volver al calendario
</a>
</div>

<div class="card">
<div class="card-body">

<table class="table table-hover align-middle text-center">

<thead>
<tr>
<th>Curso</th>
<th>Alumno</th>
<th>Horario</th>
<th>Estado</th>
<th>Acción</th>
</tr>
</thead>

<tbody>

{% for m in matriculas %}

<tr>

<td>
<strong>{{ m.curso.nombre }}</strong>
</td>

<td>
👤 {{ m.alumno.nombre }}
</td>

<td>
<span class="badge bg-light text-dark">
9 a.m.
</span>
</td>

<td>
<span class="badge badge-standby">
Standby
</span>
</td>

<td>
<a href="{% url 'programar_alumno' m.id %}" class="btn btn-programar btn-sm">
📅 Programar
</a>
</td>

</tr>

{% empty %}

<tr>
<td colspan="5" class="text-center text-muted py-4">
No hay clases en standby
</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>
</div>

</div>

</body>
</html>
