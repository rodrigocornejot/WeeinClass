<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#f6f7fb;}
.page-title{font-weight:800;color:#0f172a;}
.muted{color:#64748b;}

.card-soft{
border:0;
border-radius:14px;
box-shadow:0 10px 24px rgba(0,0,0,.06);
}
</style>
</head>

<body>

<div class="container-fluid py-4">

<div class="d-flex justify-content-between align-items-center mb-4">
<div>
<div class="page-title fs-3">Dashboard</div>
<div class="muted">Resumen rápido de matrículas</div>
</div>
</div>

<!-- KPI -->
<div class="row g-3 mb-4">

<div class="col-md-3">
<div class="card card-soft text-center p-3">
<h6>Total matriculados</h6>
<h2 id="total">0</h2>
</div>
</div>

</div>


<!-- GRAFICOS -->
<div class="row g-3">

<div class="col-md-5">
<div class="card card-soft p-3">
<h6 class="fw-bold">Curso matriculado</h6>
<canvas id="curso_chart"></canvas>
</div>
</div>

<div class="col-md-4">
<div class="card card-soft p-3">
<h6 class="fw-bold">Modalidad</h6>
<canvas id="modalidad_chart"></canvas>
</div>
</div>

</div>


<div class="row g-3 mt-3">

<div class="col-md-6">
<div class="card card-soft p-3">
<h6 class="fw-bold">Carreras</h6>
<canvas id="carrera_chart"></canvas>
</div>
</div>

<div class="col-md-6">
<div class="card card-soft p-3">
<h6 class="fw-bold">Distritos</h6>
<canvas id="distrito_chart"></canvas>
</div>
</div>

</div>


<div class="row g-3 mt-3">

<div class="col-md-6">
<div class="card card-soft p-3">
<h6 class="fw-bold">Origen del alumno</h6>
<canvas id="referencia_chart"></canvas>
</div>
</div>

<div class="col-md-6">
<div class="card card-soft p-3">
<h6 class="fw-bold">Edad alumnos</h6>
<canvas id="edad_chart"></canvas>
</div>
</div>

</div>

</div>


<script>

fetch("/datos-dashboard/")
.then(res => res.json())
.then(data => {

console.log("Datos:",data)

document.getElementById("total").innerText = data.total_matriculados


// CURSOS
new Chart(document.getElementById("curso_chart"),{
type:"pie",
data:{
labels:data.cursos.map(x=>x["curso__nombre"]),
datasets:[{
data:data.cursos.map(x=>x.total),
backgroundColor:["#6366F1","#F59E0B","#10B981","#EF4444","#8B5CF6"]
}]
}
})


// MODALIDAD
new Chart(document.getElementById("modalidad_chart"),{
type:"doughnut",
data:{
labels:data.modalidad.map(x=>x.modalidad),
datasets:[{
data:data.modalidad.map(x=>x.total),
backgroundColor:["#6366F1","#F59E0B"]
}]
}
})


// CARRERA
new Chart(document.getElementById("carrera_chart"),{
type:"bar",
data:{
labels:data.carrera.map(x=>x.carrera),
datasets:[{
label:"Alumnos",
data:data.carrera.map(x=>x.total),
backgroundColor:"#6366F1"
}]
}
})


// DISTRITO
new Chart(document.getElementById("distrito_chart"),{
type:"bar",
data:{
labels:data.distrito.map(x=>x.distrito),
datasets:[{
label:"Alumnos",
data:data.distrito.map(x=>x.total),
backgroundColor:"#10B981"
}]
}
})


// ORIGEN
new Chart(document.getElementById("referencia_chart"),{
type:"bar",
data:{
labels:data.referencia.map(x=>x.referencia),
datasets:[{
label:"Origen",
data:data.referencia.map(x=>x.total),
backgroundColor:"#F59E0B"
}]
}
})


// EDAD
new Chart(document.getElementById("edad_chart"),{
type:"line",
data:{
labels:data.edad.map(x=>x.edad),
datasets:[{
label:"Edad alumnos",
data:data.edad.map(x=>x.total),
borderColor:"#6366F1",
backgroundColor:"rgba(99,102,241,0.2)",
tension:0.3
}]
}
})

})
.catch(error=>{
console.error("Error cargando dashboard:",error)
})

</script>

</body>
</html>
