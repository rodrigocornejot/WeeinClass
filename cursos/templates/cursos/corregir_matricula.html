<!DOCTYPE html>
<html>
<head>

<title>Corregir Matrículas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h3>Corregir fecha de matrícula</h3>

<form method="get" class="mb-4">

<input type="text" name="dni" class="form-control" placeholder="Buscar por DNI">

<button class="btn btn-primary mt-2">Buscar</button>

</form>

{% if alumno %}

<h5>{{ alumno.nombre }}</h5>

<table class="table table-bordered">

<tr>

<th>Curso</th>
<th>Fecha inscripción</th>
<th>Cambiar</th>

</tr>

{% for m in matriculas %}

<tr>

<td>{{ m.curso.nombre }}</td>

<td>{{ m.fecha_inscripcion }}</td>

<td>

<form method="post">

{% csrf_token %}

<input type="hidden" name="matricula_id" value="{{m.id}}">

<input type="date" name="fecha" class="form-control">

<button class="btn btn-success btn-sm mt-1">
Actualizar
</button>

</form>

</td>

</tr>

{% endfor %}

</table>

{% endif %}

</div>

</body>
</html>
