<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Programar Alumno</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f6f7fb;
}

.card{
border:none;
border-radius:14px;
box-shadow:0 10px 24px rgba(0,0,0,.08);
}

.label-title{
font-weight:600;
color:#374151;
}

</style>

</head>

<body>

<div class="container py-5" style="max-width:600px;">

<h3 class="fw-bold mb-4">📅 Programar Clase</h3>

<div class="card">
<div class="card-body">

<div class="mb-3">
<div class="label-title">Alumno</div>
<div class="fw-semibold">👤 {{ matricula.alumno.nombre }}</div>
</div>

<div class="mb-3">
<div class="label-title">Curso</div>
<div>{{ matricula.curso.nombre }}</div>
</div>

<div class="mb-4">
<div class="label-title">Horario</div>
<div>9 a.m.</div>
</div>

<form method="post">

{% csrf_token %}

<div class="mb-4">
<label class="form-label label-title">
Seleccionar fecha
</label>

<input 
type="date" 
name="fecha"
class="form-control"
required
>
</div>

<div class="d-flex gap-2">

<button type="submit" class="btn btn-primary">
💾 Guardar programación
</button>

<a href="{% url 'clases_standby' %}" class="btn btn-outline-secondary">
Cancelar
</a>

</div>

</form>

</div>
</div>

</div>

</body>
</html>
